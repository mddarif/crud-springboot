<!DOCTYPE html>
<html>
<head>
    <title>Employee Management</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            margin: 0;
        }

        .container {
            width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2 { text-align: center; }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
        }

        .add-btn { background: #4e73df; }
        .edit-btn { background: #f6c23e; }
        .delete-btn { background: #e74a3b; }

        ul { list-style: none; padding: 0; }

        li {
            background: #f8f9fc;
            margin: 8px 0;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Employee Management System</h2>

    <input type="hidden" id="employeeId">

    <input type="text" id="name" placeholder="Enter Name">
    <input type="text" id="department" placeholder="Enter Department">
    <input type="number" id="salary" placeholder="Enter Salary">

    <button class="add-btn" onclick="saveEmployee()">Save</button>

    <h2>Employee List</h2>
    <ul id="employeeList"></ul>

</div>

<script>

const API_URL = "/employees";

function fetchEmployees() {
    fetch(API_URL)
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById("employeeList");
            list.innerHTML = "";

            data.forEach(emp => {
                const li = document.createElement("li");

                li.innerHTML = `
                    <span>
                        <strong>${emp.name}</strong> | 
                        ${emp.department} | 
                        ₹${emp.salary}
                    </span>
                    <div>
                        <button class="edit-btn" onclick="editEmployee(${emp.id}, '${emp.name}', '${emp.department}', ${emp.salary})">Edit</button>
                        <button class="delete-btn" onclick="deleteEmployee(${emp.id})">Delete</button>
                    </div>
                `;

                list.appendChild(li);
            });
        });
}

function saveEmployee() {
    const id = document.getElementById("employeeId").value;
    const name = document.getElementById("name").value;
    const department = document.getElementById("department").value;
    const salary = document.getElementById("salary").value;

    if (id) {
        // UPDATE
        fetch(API_URL + "/" + id, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, department, salary })
        }).then(() => {
            clearForm();
            fetchEmployees();
        });
    } else {
        // CREATE
        fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, department, salary })
        }).then(() => {
            clearForm();
            fetchEmployees();
        });
    }
}

function editEmployee(id, name, department, salary) {
    document.getElementById("employeeId").value = id;
    document.getElementById("name").value = name;
    document.getElementById("department").value = department;
    document.getElementById("salary").value = salary;
}

function deleteEmployee(id) {
    fetch(API_URL + "/" + id, {
        method: "DELETE"
    }).then(() => fetchEmployees());
}

function clearForm() {
    document.getElementById("employeeId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("department").value = "";
    document.getElementById("salary").value = "";
}

fetchEmployees();

</script>

</body>
</html>
